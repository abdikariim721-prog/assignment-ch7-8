    <!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Registration Form</h1>

<form>
<fieldset>
    <legend>Personal Information</legend>
  <p><label for="firstName">First Name:</label><br>
            <input type="text" name="firstName" id="firstName" placeholder="Enter First Name"></p>
            <p><label for="lastName">Last Name:</label><br>
            <input type="text" name="lastName" id="lastName" placeholder="Enter Last Name"></p>

            <p><label for="">CONTACT DETAILS:</label><br></p><hr>
            <p><label for="email">Email:</label><br>
            <input type="email" name="email" id="email" placeholder="example@gmail.com"></p>
            <p><label for="mobile">Mobile:</label><br>
            <input type="text" name="mobile" id="mobile" placeholder="+252 61 00o 0000"></p>
            <label for="">SECURITY:</label><hr>
                <p><label for="password">Password:</label><br>
                <input type="text" name="password" id="password" placeholder="Max 6 characters">
            </p>
            <p>
                <label for="">CHOOSE GENDER:</label><br><hr>
                <input type="radio" name="gender" id="male">
                <label for="male">Male</label><br>
                <input type="radio" name="gender" id="female">
                <label for="female">Female</label><br>

            </p>
            <label for="">FAVORITE COURSES:</label><br><hr>
            <P>
                <input type="checkbox" name="html" id="Html" checked>
                <label for="Html">HTML</label><br>
                <input type="checkbox" name="css" id="Css">
                <label for="Css">CSS</label><br>
                <input type="checkbox" name="javascript" id="Javascript">
                <label for="Javascript">JavaScript</label><br>
            </P>
            <label for="">COUNTRY:</label><br><hr>
            <select>
                <option value="som">Somalia</option>
                <option value="fal">Falastiin</option>
                <option value="yem">Yemen</option>
            </select><br><br>
            <label for="com">COMMENT:</label><br><hr>
            <textarea rows="5" placeholder="Right your comment"></textarea>

            <p><label for="">ACTIONS:</label></p><hr>
            <p>
                <input class="input" type="submit" name="submit" id="submit" value="SAVE">
                <input class="input" type="reset" name="reset" id="reset" value="CLEAR">
            </p>
</fieldset>
</form>
